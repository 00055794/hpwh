name: Build & Publish Docker image

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout (with LFS)
        uses: actions/checkout@v5
        with:
          lfs: true
          fetch-depth: 1

      - name: LFS diagnostics
        run: |
          set -x
          git --version
          git lfs --version
          git lfs install --local
          git lfs pull || true
          echo "--- git lfs ls-files ---"
          git lfs ls-files -s || true
          echo "--- sizes of known LFS files ---"
          for f in \
              data/distance_grid.parquet \
              nn_model/model.pt \
              nn_model/ridge_meta.joblib \
              nn_model/scaler_X.joblib \
              nn_model/scaler_y.joblib; do
            if [ -f "$f" ]; then
              printf "%-45s %s\n" "$f" "$(du -h "$f" | cut -f1)"
            else
              echo "MISSING: $f"
            fi
          done

      - name: Verify required large files are real (not LFS pointers)
        run: |
          set -e
          bad=0
          for f in \
              data/distance_grid.parquet \
              nn_model/model.pt \
              nn_model/ridge_meta.joblib \
              nn_model/scaler_X.joblib \
              nn_model/scaler_y.joblib; do
            size=$(stat -c%s "$f")
            if head -c 64 "$f" 2>/dev/null | grep -q "git-lfs.github.com/spec"; then
              echo "$f : $size bytes  -> LFS POINTER (not pulled)"
              bad=$((bad+1))
            else
              echo "$f : $size bytes  OK"
            fi
          done
          if [ "$bad" -gt 0 ]; then
            echo "FATAL: $bad file(s) still LFS pointers — LFS pull failed."
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build (and push on non-PR)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
